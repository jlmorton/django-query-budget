name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Core test matrix: SQLite across Python/Django versions
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        django-version: ["5.0", "5.1", "5.2", "6.0"]
    name: SQLite / Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-django redis
          python -m pip install "django>=${{ matrix.django-version }},<${{ matrix.django-version }}.99"
          python -m pip install -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short

  # PostgreSQL integration tests
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_query_budget
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        django-version: ["5.2", "6.0"]
    name: PostgreSQL / Django ${{ matrix.django-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-django redis psycopg2-binary
          python -m pip install "django>=${{ matrix.django-version }},<${{ matrix.django-version }}.99"
          python -m pip install -e .
      - name: Run tests
        env:
          DATABASE_BACKEND: postgres
          POSTGRES_DB: test_query_budget
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
        run: pytest tests/ -v --tb=short

  # MySQL integration tests
  test-mysql:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_query_budget
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        django-version: ["5.2", "6.0"]
    name: MySQL / Django ${{ matrix.django-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-django redis mysqlclient
          python -m pip install "django>=${{ matrix.django-version }},<${{ matrix.django-version }}.99"
          python -m pip install -e .
      - name: Run tests
        env:
          DATABASE_BACKEND: mysql
          MYSQL_DATABASE: test_query_budget
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_HOST: "127.0.0.1"
          MYSQL_PORT: "3306"
        run: pytest tests/ -v --tb=short

  # Redis integration tests
  test-redis:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    name: Redis integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-django redis
          python -m pip install "django>=6.0,<6.1"
          python -m pip install -e .
      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --tb=short
