[tox]
env_list =
    py312-django50
    py312-django51
    py312-django52
    py313-django50
    py313-django51
    py313-django52
    py314-django60

[testenv]
deps =
    pytest
    pytest-django
    redis
    django50: django>=5.0,<5.1
    django51: django>=5.1,<5.2
    django52: django>=5.2,<5.3
    django60: django>=6.0,<6.1
commands =
    pytest tests/ -v --tb=short {posargs}
set_env =
    DJANGO_SETTINGS_MODULE = tests.django_settings
    PYTHONPATH = {toxinidir}/src:{toxinidir}
